<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../favicon.ico" type="image/x-icon" />
    <title>Pick your favorite</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="hero-placeholder" id="heroPlaceholder" hidden>
          <img class="hero-placeholder__image" src="./assets/icons/profile_jino.png" alt="Pick your favorite" />
        </div>
        <div class="pool-scroll" id="poolScroll">
          <div class="pool-grid" id="poolGrid"></div>
        </div>
      </header>

      <section class="content-layout">
        <aside class="menu-panel" id="menuPanel">
          <div class="menu-panel__header">
            <div class="menu-panel__title">Menu</div>
            <button class="menu-panel__search" id="openMenuSearchButton" type="button" aria-label="메뉴 검색 화면 열기" title="메뉴 검색"></button>
          </div>
          <div id="menuList"></div>
        </aside>

        <section class="menu-browser-panel" id="menuBrowserPanel" hidden>
          <div class="menu-browser__top">
            <div>
              <h2>메뉴 선택</h2>
              <p>원하는 월드컵 메뉴를 골라 시작하세요.</p>
            </div>
            <label class="menu-search">
              <span>메뉴 검색</span>
              <input id="menuSearchInput" type="search" placeholder="예: 미국, 2020, 여가수" autocomplete="off" />
            </label>
          </div>
          <div class="menu-browser-grid" id="menuBrowserGrid"></div>
        </section>

        <section class="battle-panel" id="battlePanel">
          <div class="battle-top">
            <h2 id="battleTitle">Random 2 Card Match</h2>
            <div class="progress" id="progressText">0 / 16 selected</div>
          </div>

          <div class="battle-grid" id="battleGrid">
            <article class="battle-card" data-side="left" id="leftCard" role="button" tabindex="0">
              <img class="battle-card__image" id="leftImage" alt="" />
              <h3 id="leftTitle"></h3>
              <p id="leftText"></p>
              <div class="battle-card__source" id="leftSource"></div>
            </article>

            <article class="battle-card" data-side="right" id="rightCard" role="button" tabindex="0">
              <img class="battle-card__image" id="rightImage" alt="" />
              <h3 id="rightTitle"></h3>
              <p id="rightText"></p>
              <div class="battle-card__source" id="rightSource"></div>
            </article>
          </div>
        </section>

        <aside class="history-panel" id="historyPanel">
          <section class="history-section history-section--ranking">
            <div class="history-panel__top">
              <div>
                <div class="history-panel__eyebrow">Ranking</div>
                <h2 class="history-panel__title">메뉴 랭킹</h2>
              </div>
            </div>
            <a class="ranking-link" id="rankingButton" href="./ranking/"> 랭킹화면으로 이동 </a>
          </section>

          <section class="history-section history-section--local">
            <div class="history-panel__top">
              <div>
                <div class="history-panel__eyebrow">LocalStorage</div>
                <h2 class="history-panel__title">Final Cards</h2>
              </div>
              <button class="history-panel__clear" id="clearHistoryButton" type="button">전체삭제</button>
            </div>
            <div class="history-list" id="historyList"></div>
          </section>
        </aside>
      </section>

      <nav class="mobile-nav" aria-label="모바일 패널 메뉴">
        <button class="mobile-nav__button" id="openMobileSearchButton" type="button" aria-controls="menuBrowserPanel">
          <span class="mobile-nav__icon mobile-nav__icon--search"></span>
          <span>검색</span>
        </button>
        <button class="mobile-nav__button" id="openMobileMenuButton" type="button" aria-controls="menuPanel" aria-expanded="false">
          <span class="mobile-nav__icon mobile-nav__icon--menu"></span>
          <span>메뉴</span>
        </button>
        <button class="mobile-nav__button" id="openMobileHistoryButton" type="button" aria-controls="historyPanel" aria-expanded="false">
          <span class="mobile-nav__icon mobile-nav__icon--history"></span>
          <span>기록</span>
        </button>
      </nav>
    </main>

    <div class="mobile-panel-backdrop" id="mobilePanelBackdrop" hidden></div>

    <div class="confirm-modal" id="confirmModal" hidden>
      <div class="confirm-modal__backdrop" data-close-confirm-modal></div>
      <div class="confirm-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle" aria-describedby="confirmModalMessage">
        <h2 class="confirm-modal__title" id="confirmModalTitle">삭제 확인</h2>
        <p class="confirm-modal__message" id="confirmModalMessage">정말 삭제하시겠습니까?</p>
        <div class="confirm-modal__actions">
          <button class="confirm-modal__button confirm-modal__button--secondary" id="cancelConfirmButton" type="button">아니오</button>
          <button class="confirm-modal__button confirm-modal__button--primary" id="acceptConfirmButton" type="button">예</button>
        </div>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
